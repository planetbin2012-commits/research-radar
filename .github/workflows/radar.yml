name: Paper Bot

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 提到顶层，全局生效

jobs:
  run-paperbot:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      RECIPIENTS: ${{ secrets.RECIPIENTS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Restore paper database
        uses: actions/cache@v4
        with:
          path: papers.db
          key: paper-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            paper-db-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper bot
        run: python paper_bot_github.py

  keep-alive:
    runs-on: ubuntu-latest
    needs: run-paperbot
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create empty commit if 15 days passed
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DIFF=$(( (NOW - LAST_COMMIT) / 86400 ))
          echo "Days since last commit: $DIFF"
          if [ $DIFF -ge 15 ]; then
            git commit --allow-empty -m "keep schedule alive $(date -u)"
            git push
          else
            echo "No keep-alive commit needed"
          fi
